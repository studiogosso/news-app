<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>News Hub</title>
<style>
  :root {
    --bg: #0f1117;
    --bg-card: #1a1d27;
    --bg-card-hover: #222638;
    --bg-surface: #151821;
    --text: #e4e6eb;
    --text-dim: #8b8fa3;
    --text-muted: #5c6074;
    --border: #2a2d3a;
    --japan: #e74c5e;
    --france: #4a90d9;
    --world: #43b581;
    --tech: #9b6dff;
    --accent: var(--japan);
    --radius: 12px;
    --radius-sm: 8px;
    --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Header */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    backdrop-filter: blur(12px);
  }

  .header-title {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .icon-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 36px;
    height: 36px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition);
    font-size: 16px;
  }

  .icon-btn:hover { background: var(--bg-card); color: var(--text); }
  .icon-btn.spinning svg { animation: spin 1s linear infinite; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Tabs */
  .tabs {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background: var(--bg-surface);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 6px 8px;
    padding-bottom: max(6px, env(safe-area-inset-bottom));
    backdrop-filter: blur(12px);
  }

  .tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 8px 4px;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    border-radius: var(--radius-sm);
    position: relative;
  }

  .tab .tab-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    transition: var(--transition);
    opacity: 0.4;
  }

  .tab.active { color: var(--text); }
  .tab.active .tab-dot { opacity: 1; transform: scale(1.3); }
  .tab[data-cat="japan"] .tab-dot { background: var(--japan); }
  .tab[data-cat="france"] .tab-dot { background: var(--france); }
  .tab[data-cat="world"] .tab-dot { background: var(--world); }
  .tab[data-cat="tech"] .tab-dot { background: var(--tech); }

  /* Main content */
  .main {
    padding: 12px 12px 80px 12px;
    max-width: 720px;
    margin: 0 auto;
  }

  /* Category indicator bar */
  .category-bar {
    height: 3px;
    border-radius: 2px;
    margin: 0 4px 16px 4px;
    transition: background var(--transition);
  }

  /* Feed info */
  .feed-status {
    text-align: center;
    padding: 8px 0 16px 0;
    font-size: 12px;
    color: var(--text-muted);
  }

  /* Article Card */
  .article-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
    transition: var(--transition);
  }
  .article-card:hover { background: var(--bg-card-hover); }

  /* Large card (importance 7+) */
  .card-large { border-width: 2px; }
  .card-hero { height: 200px; background-size: cover; background-position: center; position: relative; }
  .card-hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 50%); display: flex; flex-direction: column; justify-content: flex-end; padding: 16px; }
  .card-hero-notimg { padding: 20px 16px; background: linear-gradient(135deg, #1a1d27 0%, #2e3347 100%); }
  .card-hero-title { font-size: 1.2rem; font-weight: 800; color: #fff; line-height: 1.4; }
  .card-body { padding: 12px 16px; }
  .imp-badge { font-size: 0.6rem; font-weight: 800; padding: 3px 8px; border-radius: 4px; display: inline-block; margin-bottom: 6px; }
  .imp-high { background: #e74c5e; color: #fff; }
  .imp-mid { background: #fbbf24; color: #000; font-size: 0.55rem; padding: 2px 6px; margin-left: 6px; }
  .summary-ja { font-size: 0.85rem; color: #e0e0f0; line-height: 1.5; margin: 6px 0; padding: 8px; background: rgba(108,92,231,0.1); border-radius: 8px; border-left: 3px solid; }

  /* Medium card (importance 4-6) */
  .card-medium .article-title { font-size: 0.95rem; margin-top: 4px; }
  .card-medium { padding: 12px 14px; }
  .card-thumb { width: 90px; height: 70px; object-fit: cover; border-radius: 8px; flex-shrink: 0; }

  /* Small card (importance 1-3) */
  .card-small { padding: 10px 12px; cursor: pointer; margin-bottom: 4px; }
  .card-small:hover { background: var(--bg-card-hover); }
  .card-mini-thumb { width: 40px; height: 40px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }

  .article-header {
    padding: 14px 16px;
    cursor: pointer;
  }

  .article-source {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    font-size: 12px;
    color: var(--text-dim);
  }

  .source-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    color: #fff;
    opacity: 0.9;
  }

  .article-title {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.45;
    margin-bottom: 6px;
    color: var(--text);
  }

  .article-desc {
    font-size: 13px;
    line-height: 1.55;
    color: var(--text-dim);
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .article-actions {
    display: flex;
    gap: 6px;
    padding: 0 16px 12px 16px;
    flex-wrap: wrap;
  }

  .action-btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .action-btn:hover { background: var(--bg-card-hover); color: var(--text); border-color: var(--text-muted); }
  .action-btn.translate-btn:hover { border-color: var(--accent); color: var(--accent); }
  .action-btn.summary-btn:hover { border-color: #f0a040; color: #f0a040; }
  .action-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(255,255,255,0.03); }

  /* Article detail (expanded) */
  .article-detail {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .article-detail.open {
    max-height: 3000px;
  }

  .article-detail-inner {
    padding: 0 16px 16px 16px;
    border-top: 1px solid var(--border);
  }

  .detail-content {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text-dim);
    padding: 14px 0;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .detail-translation {
    margin-top: 12px;
    padding: 14px;
    background: rgba(255,255,255,0.02);
    border-left: 3px solid var(--accent);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    font-size: 14px;
    line-height: 1.7;
    white-space: pre-wrap;
  }

  .detail-translation .label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    opacity: 0.6;
  }

  .detail-summary {
    margin-top: 12px;
    padding: 14px;
    background: rgba(240, 160, 64, 0.06);
    border-left: 3px solid #f0a040;
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    font-size: 14px;
    line-height: 1.7;
    white-space: pre-wrap;
  }

  .detail-summary .label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #f0a040;
    margin-bottom: 8px;
    opacity: 0.6;
  }

  .detail-actions {
    display: flex;
    gap: 6px;
    padding-top: 12px;
    flex-wrap: wrap;
  }

  .detail-link {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: var(--transition);
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }

  .detail-link:hover { background: var(--bg-card-hover); color: var(--text); }

  /* Spinner */
  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid var(--text-muted);
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  .spinner-overlay {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 30px;
    color: var(--text-dim);
    font-size: 13px;
  }

  /* Settings modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    width: 100%;
    max-width: 400px;
    transform: scale(0.95);
    transition: transform 0.2s ease;
  }

  .modal-overlay.open .modal {
    transform: scale(1);
  }

  .modal h2 {
    font-size: 18px;
    margin-bottom: 16px;
    font-weight: 700;
  }

  .modal label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .modal input[type="password"],
  .modal input[type="text"] {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: var(--transition);
    margin-bottom: 16px;
    font-family: monospace;
  }

  .modal input:focus { border-color: var(--accent); }

  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  .btn-primary {
    padding: 8px 20px;
    border-radius: var(--radius-sm);
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
  }

  .btn-primary:hover { opacity: 0.85; }

  .btn-secondary {
    padding: 8px 20px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
  }

  .btn-secondary:hover { background: var(--bg-card-hover); color: var(--text); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  .empty-state .icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
  .empty-state .msg { font-size: 14px; }

  /* Toast */
  .toast-container {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 300;
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
  }

  .toast {
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 10px 18px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: var(--text);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
    pointer-events: all;
  }

  .toast.error { border-color: var(--japan); }

  @keyframes toastIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-10px); } }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* Skeleton loading */
  .skeleton-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 10px;
  }

  .skeleton-line {
    height: 12px;
    background: linear-gradient(90deg, var(--border) 25%, var(--bg-card-hover) 50%, var(--border) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 4px;
    margin-bottom: 10px;
  }

  .skeleton-line:nth-child(1) { width: 30%; height: 10px; }
  .skeleton-line:nth-child(2) { width: 85%; height: 16px; }
  .skeleton-line:nth-child(3) { width: 100%; }
  .skeleton-line:nth-child(4) { width: 70%; }

  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* Toggle */
  .toggle-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 8px;
  }

  .toggle-switch {
    position: relative;
    width: 36px;
    height: 20px;
    background: var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: var(--transition);
    border: none;
    padding: 0;
  }

  .toggle-switch.on { background: var(--accent); }

  .toggle-switch::after {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #fff;
    top: 2px;
    left: 2px;
    transition: var(--transition);
  }

  .toggle-switch.on::after { left: 18px; }

  /* Responsive */
  @media (min-width: 600px) {
    .main { padding: 16px 20px 80px 20px; }
    .article-title { font-size: 16px; }
  }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-title">News Hub</div>
  <div class="header-actions">
    <button class="icon-btn" id="refreshBtn" title="更新">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
    </button>
    <button class="icon-btn" id="settingsBtn" title="設定">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>
</header>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Main content -->
<main class="main" id="mainContent">
  <div class="category-bar" id="categoryBar"></div>
  <div class="feed-status" id="feedStatus"></div>
  <div id="articleList"></div>
</main>

<!-- Bottom tabs -->
<nav class="tabs">
  <button class="tab active" data-cat="japan" onclick="switchCategory('japan')">
    <span class="tab-dot"></span>
    <span>日本</span>
  </button>
  <button class="tab" data-cat="france" onclick="switchCategory('france')">
    <span class="tab-dot"></span>
    <span>フランス</span>
  </button>
  <button class="tab" data-cat="world" onclick="switchCategory('world')">
    <span class="tab-dot"></span>
    <span>世界</span>
  </button>
  <button class="tab" data-cat="tech" onclick="switchCategory('tech')">
    <span class="tab-dot"></span>
    <span>テック</span>
  </button>
</nav>

<!-- Settings modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h2>設定</h2>
    <label for="apiKeyInput">Claude API Key</label>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-api03-..." autocomplete="off">
    <label for="proxyInput">CORS Proxy URL (任意)</label>
    <input type="text" id="proxyInput" placeholder="https://api.allorigins.win/raw?url=">
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeSettings()">キャンセル</button>
      <button class="btn-primary" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>

<script>
// ─── Configuration ───────────────────────────────────────────────
const FEEDS = {
  japan: [
    { name: 'NHK', url: 'https://www3.nhk.or.jp/rss/news/cat0.xml', lang: 'ja' },
    { name: 'Yahoo!ニュース', url: 'https://news.yahoo.co.jp/rss/topics/top-picks.xml', lang: 'ja' },
  ],
  france: [
    { name: 'France 24', url: 'https://www.france24.com/fr/rss', lang: 'fr' },
    { name: 'Le Monde', url: 'https://www.lemonde.fr/rss/une.xml', lang: 'fr' },
  ],
  world: [
    { name: 'BBC World', url: 'https://feeds.bbci.co.uk/news/world/rss.xml', lang: 'en' },
    { name: 'Reuters', url: 'https://www.rss-bridge.org/bridge01/?action=display&bridge=Reuters&feed=world&format=Atom', lang: 'en' },
  ],
  tech: [
    { name: 'Hacker News', url: 'https://hnrss.org/frontpage', lang: 'en' },
  ],
};

const CATEGORY_COLORS = {
  japan: '#e74c5e',
  france: '#4a90d9',
  world: '#43b581',
  tech: '#9b6dff',
};

const CATEGORY_LABELS = {
  japan: '日本',
  france: 'フランス',
  world: '世界',
  tech: 'テック',
};

const DEFAULT_PROXY = 'https://api.allorigins.win/raw?url=';

// ─── State ───────────────────────────────────────────────────────
let currentCategory = 'japan';
let articlesCache = {};    // { category: [articles] }
let contentCache = {};     // { url: content }
let translationCache = {}; // { key: translated text }
let summaryCache = {};     // { url: summary }
let expandedArticle = null;
let isLoading = false;

// ─── Init ────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // Show settings on first use if no API key
  if (!getApiKey()) {
    openSettings();
  }
  loadFeeds(currentCategory);
  updateCategoryBar();
});

document.getElementById('refreshBtn').addEventListener('click', () => {
  delete articlesCache[currentCategory];
  loadFeeds(currentCategory);
});

document.getElementById('settingsBtn').addEventListener('click', openSettings);

// Close modal on overlay click
document.getElementById('settingsModal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeSettings();
});

// ─── Settings ────────────────────────────────────────────────────
function getApiKey() {
  return localStorage.getItem('news_claude_key') || '';
}

function getProxyUrl() {
  return localStorage.getItem('news_proxy_url') || DEFAULT_PROXY;
}

function openSettings() {
  const modal = document.getElementById('settingsModal');
  document.getElementById('apiKeyInput').value = getApiKey();
  document.getElementById('proxyInput').value = getProxyUrl();
  modal.classList.add('open');
}

function closeSettings() {
  document.getElementById('settingsModal').classList.remove('open');
}

function saveSettings() {
  const key = document.getElementById('apiKeyInput').value.trim();
  const proxy = document.getElementById('proxyInput').value.trim();
  if (key) localStorage.setItem('news_claude_key', key);
  if (proxy) localStorage.setItem('news_proxy_url', proxy);

  showToast('設定を保存しました');
}

// ─── RSS Fetching ────────────────────────────────────────────────
async function loadFeeds(category) {
  if (isLoading) return;
  isLoading = true;

  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');

  const list = document.getElementById('articleList');
  const status = document.getElementById('feedStatus');
  status.textContent = '';

  // Show skeleton
  list.innerHTML = Array(5).fill(0).map(() => `
    <div class="skeleton-card">
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
    </div>
  `).join('');

  const feeds = FEEDS[category];
  const proxyBase = getProxyUrl();
  let allArticles = [];
  let successCount = 0;
  let errorFeeds = [];

  const promises = feeds.map(async (feed) => {
    try {
      const proxyUrl = proxyBase + encodeURIComponent(feed.url);
      const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(15000) });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      const articles = parseRSS(text, feed);
      allArticles.push(...articles);
      successCount++;
    } catch (err) {
      console.warn(`Failed to fetch ${feed.name}:`, err);
      errorFeeds.push(feed.name);
    }
  });

  await Promise.all(promises);

  // Sort by date (newest first)
  allArticles.sort((a, b) => (b.dateObj?.getTime() || 0) - (a.dateObj?.getTime() || 0));
  articlesCache[category] = allArticles;

  if (errorFeeds.length > 0) {
    status.textContent = `${successCount} フィード取得済み / ${errorFeeds.join(', ')} 取得失敗`;
  } else {
    status.textContent = `${allArticles.length} 件の記事 — ブリーフィング生成中...`;
  }

  renderArticles(category);
  btn.classList.remove('spinning');
  isLoading = false;

  // Auto-briefing: sort by importance + translate + summarize
  if (allArticles.length > 0 && getApiKey()) {
    generateBriefing(category, allArticles);
  } else if (!getApiKey()) {
    status.textContent = `${allArticles.length} 件の記事 (APIキー未設定: ブリーフィングなし)`;
  }
}

// ─── AI Briefing ─────────────────────────────────────────────────
let briefingCache = {};

async function generateBriefing(category, articles) {
  if (briefingCache[category]) {
    applyBriefing(category, briefingCache[category]);
    return;
  }

  const status = document.getElementById('feedStatus');
  const summaries = articles.slice(0, 15).map((a, i) =>
    `[${i}] ${a.source} | ${a.title} | ${a.description?.slice(0, 150) || ''}`
  ).join('\n');

  const lang = articles[0]?.lang || 'en';
  const prompt = `以下は${lang === 'ja' ? '日本語' : lang === 'fr' ? 'フランス語' : '英語'}のニュース記事一覧です。

${summaries}

以下のJSON形式で返してください（コードブロック不要、JSONのみ）:
[
  {"idx": 記事番号, "importance": 1-10の重要度, "summary_ja": "日本語で1-2行の要約"}
]

重要度の基準: 国際的影響度、緊急性、多くの人に関係するかで判断。
全記事を重要度の高い順に並べてください。`;

  try {
    const result = await callClaude(prompt);
    const cleaned = result.replace(/```json?\s*/g, '').replace(/```/g, '').trim();
    const briefing = JSON.parse(cleaned);
    briefingCache[category] = briefing;
    applyBriefing(category, briefing);
    status.textContent = `${articles.length} 件 — 重要度順で表示中`;
  } catch (e) {
    console.error('Briefing error:', e);
    status.textContent = `${articles.length} 件の記事 (ブリーフィング生成失敗)`;
  }
}

function applyBriefing(category, briefing) {
  const articles = articlesCache[category];
  if (!articles) return;

  // Apply importance scores and summaries
  briefing.forEach(b => {
    if (articles[b.idx]) {
      articles[b.idx].importance = b.importance;
      articles[b.idx].summary_ja = b.summary_ja;
    }
  });

  // Sort by importance (highest first)
  articles.sort((a, b) => (b.importance || 0) - (a.importance || 0));
  renderArticles(category);
}

// ─── RSS Parsing ─────────────────────────────────────────────────
function parseRSS(xmlText, feed) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlText, 'text/xml');

  // Check for parse errors
  if (doc.querySelector('parsererror')) {
    console.warn('XML parse error for', feed.name);
    return [];
  }

  // Extract image from RSS item
  function getItemImage(item) {
    // media:content or media:thumbnail
    const media = item.querySelector('content[url]') || item.getElementsByTagNameNS('http://search.yahoo.com/mrss/', 'content')[0] || item.getElementsByTagNameNS('http://search.yahoo.com/mrss/', 'thumbnail')[0];
    if (media?.getAttribute('url')) return media.getAttribute('url');
    // enclosure
    const enc = item.querySelector('enclosure[type^="image"]');
    if (enc?.getAttribute('url')) return enc.getAttribute('url');
    // image tag in description
    const desc = item.querySelector('description')?.textContent || '';
    const imgMatch = desc.match(/<img[^>]+src=["']([^"']+)["']/);
    if (imgMatch) return imgMatch[1];
    return '';
  }

  // Try RSS format
  let items = doc.querySelectorAll('item');
  if (items.length > 0) {
    return Array.from(items).slice(0, 20).map(item => {
      const pubDate = item.querySelector('pubDate')?.textContent || '';
      return {
        title: cleanText(item.querySelector('title')?.textContent || ''),
        link: item.querySelector('link')?.textContent?.trim() || '',
        description: cleanText(stripHTML(item.querySelector('description')?.textContent || '')),
        image: getItemImage(item),
        pubDate: pubDate,
        dateObj: pubDate ? new Date(pubDate) : null,
        source: feed.name,
        lang: feed.lang,
        category: currentCategory,
      };
    });
  }

  // Try Atom format
  const entries = doc.querySelectorAll('entry');
  if (entries.length > 0) {
    return Array.from(entries).slice(0, 20).map(entry => {
      const updated = entry.querySelector('updated')?.textContent || entry.querySelector('published')?.textContent || '';
      const linkEl = entry.querySelector('link[href]');
      return {
        title: cleanText(entry.querySelector('title')?.textContent || ''),
        link: linkEl ? linkEl.getAttribute('href') : '',
        description: cleanText(stripHTML(entry.querySelector('summary')?.textContent || entry.querySelector('content')?.textContent || '')),
        pubDate: updated,
        dateObj: updated ? new Date(updated) : null,
        source: feed.name,
        lang: feed.lang,
        category: currentCategory,
      };
    });
  }

  return [];
}

function stripHTML(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  return tmp.textContent || tmp.innerText || '';
}

function cleanText(text) {
  return text.replace(/\s+/g, ' ').trim();
}

function formatDate(dateObj) {
  if (!dateObj || isNaN(dateObj.getTime())) return '';
  const now = new Date();
  const diff = now - dateObj;
  const minutes = Math.floor(diff / 60000);
  const hours = Math.floor(diff / 3600000);

  if (minutes < 1) return 'たった今';
  if (minutes < 60) return `${minutes}分前`;
  if (hours < 24) return `${hours}時間前`;

  const days = Math.floor(hours / 24);
  if (days < 7) return `${days}日前`;

  return dateObj.toLocaleDateString('ja-JP', { month: 'short', day: 'numeric' });
}

function renderArticles(category) {

          <div class="card-body">
            <div class="article-source"><span class="source-badge" style="background:${color}">${escapeHTML(article.source)}</span><span>${formatDate(article.dateObj)}</span></div>
            ${article.summary_ja ? `<div class="summary-ja" style="border-color:${color}">📋 ${escapeHTML(article.summary_ja)}</div>` : ''}
            <div class="article-desc">${escapeHTML(article.description)}</div>
            <div class="article-actions">

              <button class="action-btn" onclick="event.stopPropagation();toggleArticle('${articleId}',${idx})">詳細</button>

            <div style="flex:1;min-width:0">
              <div class="article-source"><span class="source-badge" style="background:${color}">${escapeHTML(article.source)}</span><span>${formatDate(article.dateObj)}</span><span class="imp-badge imp-mid">重要度 ${imp}</span></div>
              <div class="article-title">${escapeHTML(article.title)}</div>
              ${article.summary_ja ? `<div class="summary-ja" style="border-color:${color}">📋 ${escapeHTML(article.summary_ja)}</div>` : ''}
            </div>
          </div>
          <div class="article-actions">
            ${!isJa ? `<button class="action-btn translate-btn" onclick="event.stopPropagation();translateArticleTitle(${idx})">翻訳</button>` : ''}
            <button class="action-btn" onclick="event.stopPropagation();toggleArticle('${articleId}',${idx})">詳細</button>
          </div>
          <div class="article-detail ${isExpanded?'open':''}" id="detail-${articleId}"><div class="article-detail-inner" id="detail-inner-${articleId}">${isExpanded?getDetailHTML(article,idx):''}</div></div>

              ${article.summary_ja ? `<div style="font-size:0.78rem;color:var(--text);margin-top:2px">${escapeHTML(article.summary_ja)}</div>` : `<div style="font-size:0.78rem;color:var(--text);margin-top:2px">${escapeHTML(article.title)}</div>`}

function getDetailHTML(article, idx) {
  const url = article.link;
  const cacheKey = url;
  const hasContent = contentCache[cacheKey];
  const isJa = article.lang === 'ja';
  const translationKey = `content-${cacheKey}`;
  const hasTranslation = translationCache[translationKey];
  const titleTransKey = `title-${cacheKey}`;
  const hasTitleTranslation = translationCache[titleTransKey];
  const hasSummary = summaryCache[cacheKey];

  let html = '<div class="detail-actions">';

  if (!isJa) {
    html += `<button class="action-btn translate-btn" onclick="event.stopPropagation(); translateContent(${idx})">コンテンツ翻訳</button>`;
  }
  html += `<button class="action-btn summary-btn" onclick="event.stopPropagation(); summarizeArticle(${idx})">要約</button>`;
  html += `<a class="detail-link" href="${escapeHTML(url)}" target="_blank" rel="noopener" onclick="event.stopPropagation();">元の記事 &#8599;</a>`;
  html += '</div>';

  if (hasTitleTranslation) {
    html += `<div class="detail-translation"><div class="label">タイトル翻訳</div>${escapeHTML(translationCache[titleTransKey])}</div>`;
  }

  if (hasSummary) {
    html += `<div class="detail-summary"><div class="label">要約</div>${escapeHTML(summaryCache[cacheKey])}</div>`;
  }

  if (hasContent) {
    if (hasTranslation) {
      html += `<div class="detail-translation"><div class="label">翻訳</div>${escapeHTML(translationCache[translationKey])}</div>`;
    }
    html += `<div class="detail-content">${escapeHTML(contentCache[cacheKey])}</div>`;
  } else {
    html += `<div class="spinner-overlay" id="content-loader-${idx}"><div class="spinner"></div> コンテンツを読み込み中...</div>`;
  }

  return html;
}

function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ─── Article Expand/Collapse ─────────────────────────────────────
async function toggleArticle(articleId, idx) {
  const detail = document.getElementById(`detail-${articleId}`);
  const inner = document.getElementById(`detail-inner-${articleId}`);

  if (expandedArticle === articleId) {
    // Collapse
    detail.classList.remove('open');
    expandedArticle = null;
    setTimeout(() => { inner.innerHTML = ''; }, 300);
    return;
  }

  // Collapse previously expanded
  if (expandedArticle) {
    const prevDetail = document.getElementById(`detail-${expandedArticle}`);
    const prevInner = document.getElementById(`detail-inner-${expandedArticle}`);
    if (prevDetail) prevDetail.classList.remove('open');
    if (prevInner) setTimeout(() => { prevInner.innerHTML = ''; }, 300);
  }

  expandedArticle = articleId;
  const articles = articlesCache[currentCategory];
  const article = articles[idx];

  inner.innerHTML = getDetailHTML(article, idx);
  // Force reflow then open
  detail.offsetHeight;
  detail.classList.add('open');

  // Scroll card into view
  const card = document.getElementById(`card-${articleId}`);
  setTimeout(() => {
    card.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);

  // Fetch content if not cached
  if (!contentCache[article.link]) {
    await fetchArticleContent(article.link, idx);
  }
}

// ─── Article Content Fetching ────────────────────────────────────
async function fetchArticleContent(url, idx) {
  try {
    const proxyUrl = getProxyUrl() + encodeURIComponent(url);
    const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(20000) });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const html = await res.text();
    const doc = new DOMParser().parseFromString(html, 'text/html');

    // Remove script and style tags
    doc.querySelectorAll('script, style, nav, header, footer, aside, .ad, .advertisement, .social-share').forEach(el => el.remove());

    // Try to extract main content
    const selectors = ['article', '[role="main"]', '.article-body', '.article-content', '.story-body', '.post-content', 'main', '.content', '#content', '.entry-content'];
    let content = null;

    for (const sel of selectors) {
      const el = doc.querySelector(sel);
      if (el && el.textContent.trim().length > 100) {
        content = el.textContent.trim();
        break;
      }
    }

    if (!content) {
      // Fallback: get all paragraphs
      const paras = Array.from(doc.querySelectorAll('p'))
        .map(p => p.textContent.trim())
        .filter(t => t.length > 30);
      content = paras.join('\n\n');
    }

    content = content
      .replace(/\n{3,}/g, '\n\n')
      .replace(/[ \t]+/g, ' ')
      .trim()
      .slice(0, 5000);

    contentCache[url] = content || 'コンテンツを取得できませんでした';
  } catch (err) {
    console.warn('Failed to fetch article content:', err);
    contentCache[url] = 'コンテンツの取得に失敗しました。元の記事リンクをご利用ください。';
  }

  // Re-render the detail if still expanded
  refreshExpandedDetail(idx);
}

function refreshExpandedDetail(idx) {
  const articleId = `article-${currentCategory}-${idx}`;
  if (expandedArticle !== articleId) return;
  const inner = document.getElementById(`detail-inner-${articleId}`);
  const articles = articlesCache[currentCategory];
  if (inner && articles[idx]) {
    inner.innerHTML = getDetailHTML(articles[idx], idx);
  }
}

// ─── Claude API Translation ─────────────────────────────────────
async function callClaude(prompt) {
  const apiKey = getApiKey();
  if (!apiKey) {
    showToast('APIキーを設定してください', true);
    openSettings();
    throw new Error('No API key');
  }

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'content-type': 'application/json',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 2000,
      messages: [{ role: 'user', content: prompt }],
    }),
  });

  if (!res.ok) {
    const errBody = await res.text();
    console.error('Claude API error:', res.status, errBody);
    if (res.status === 401) {
      showToast('APIキーが無効です。設定を確認してください。', true);
      throw new Error('Invalid API key');
    }
    throw new Error(`Claude API error: ${res.status}`);
  }

  const data = await res.json();
  return data.content?.[0]?.text || '';
}

async function translateArticleTitle(idx) {
  const articles = articlesCache[currentCategory];
  const article = articles[idx];
  const cacheKey = `title-${article.link}`;

  if (translationCache[cacheKey]) {
    showToast('翻訳済みです');
    return;
  }

  // Show spinner on the button
  const card = document.getElementById(`card-article-${currentCategory}-${idx}`);
  const btn = card?.querySelector('.translate-btn');
  if (btn) {
    btn.innerHTML = '<span class="spinner"></span> 翻訳中...';
    btn.disabled = true;
  }

  try {
    const prompt = `以下のニュース記事タイトルと概要を日本語に翻訳してください。翻訳文のみ出力し、説明は不要です。

タイトル: ${article.title}
概要: ${article.description}

形式:
【タイトル】翻訳されたタイトル
【概要】翻訳された概要`;

    const result = await callClaude(prompt);
    translationCache[cacheKey] = result;
    showToast('翻訳完了');
  } catch (err) {
    showToast('翻訳に失敗しました', true);
  }

  // Re-render to show translation
  renderArticles(currentCategory);
  // Re-expand if was expanded
  if (expandedArticle === `article-${currentCategory}-${idx}`) {
    const detail = document.getElementById(`detail-article-${currentCategory}-${idx}`);
    const inner = document.getElementById(`detail-inner-article-${currentCategory}-${idx}`);
    if (detail && inner) {
      inner.innerHTML = getDetailHTML(article, idx);
      detail.classList.add('open');
    }
  }
}

async function translateContent(idx) {
  const articles = articlesCache[currentCategory];
  const article = articles[idx];
  const url = article.link;
  const cacheKey = `content-${url}`;

  if (translationCache[cacheKey]) {
    showToast('翻訳済みです');
    return;
  }

  const content = contentCache[url];
  if (!content || content === 'コンテンツを取得できませんでした' || content === 'コンテンツの取得に失敗しました。元の記事リンクをご利用ください。') {
    showToast('コンテンツがまだ読み込まれていません', true);
    return;
  }

  showToast('翻訳中...');

  try {
    const truncated = content.slice(0, 3000);
    const prompt = `以下のニュース記事を日本語に翻訳してください。自然な日本語で、翻訳文のみ出力してください。

${truncated}`;

    const result = await callClaude(prompt);
    translationCache[cacheKey] = result;
    showToast('翻訳完了');
  } catch (err) {
    showToast('翻訳に失敗しました', true);
  }

  refreshExpandedDetail(idx);
}

async function summarizeArticle(idx) {
  const articles = articlesCache[currentCategory];
  const article = articles[idx];
  const url = article.link;

  if (summaryCache[url]) {
    showToast('要約済みです');
    return;
  }

  // Use content if available, otherwise use description
  const source = contentCache[url] || article.description;
  if (!source) {
    showToast('要約するコンテンツがありません', true);
    return;
  }

  showToast('要約を生成中...');

  try {
    const truncated = source.slice(0, 3000);
    const prompt = `以下のニュース記事を日本語で3行で要約してください。箇条書きではなく、3つの文で簡潔にまとめてください。要約のみ出力し、前置きは不要です。

タイトル: ${article.title}
内容: ${truncated}`;

    const result = await callClaude(prompt);
    summaryCache[url] = result;
    showToast('要約完了');
  } catch (err) {
    showToast('要約の生成に失敗しました', true);
  }

  refreshExpandedDetail(idx);
}

// ─── Keyboard shortcuts ──────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  const cats = ['japan', 'france', 'world', 'tech'];
  if (e.key >= '1' && e.key <= '4') {
    switchCategory(cats[parseInt(e.key) - 1]);
  }
  if (e.key === 'r' || e.key === 'R') {
    delete articlesCache[currentCategory];
    loadFeeds(currentCategory);
  }
  if (e.key === 'Escape') {
    closeSettings();
  }
});

// Initial accent color
document.documentElement.style.setProperty('--accent', CATEGORY_COLORS[currentCategory]);
</script>
</body>
